<svg width="1100" height="420" viewBox="0 0 1100 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1100" height="420" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Indexing And Slicing</text>
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">Example: arr = [10, 20, 30, 40, 50]</text>

  <g font-family="Arial, sans-serif" font-size="20" text-anchor="middle">
    <rect x="100" y="150" width="120" height="90" rx="14" fill="#e0f2fe" stroke="#38bdf8"/>
    <rect x="240" y="150" width="120" height="90" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <rect x="380" y="150" width="120" height="90" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <rect x="520" y="150" width="120" height="90" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <rect x="660" y="150" width="120" height="90" rx="14" fill="#fee2e2" stroke="#f87171"/>

    <text x="160" y="205" fill="#111827">10</text>
    <text x="300" y="205" fill="#111827">20</text>
    <text x="440" y="205" fill="#111827">30</text>
    <text x="580" y="205" fill="#111827">40</text>
    <text x="720" y="205" fill="#111827">50</text>

    <text x="160" y="275" font-size="18" fill="#6b7280">arr[0]</text>
    <text x="300" y="275" font-size="18" fill="#6b7280">arr[1]</text>
    <text x="440" y="275" font-size="18" fill="#6b7280">arr[2]</text>
    <text x="580" y="275" font-size="18" fill="#6b7280">arr[3]</text>
    <text x="720" y="275" font-size="18" fill="#6b7280">arr[-1]</text>
  </g>

  <rect x="230" y="320" width="420" height="50" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="440" y="352" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#111827">arr[1:4] -> [20, 30, 40]</text>

  <text x="840" y="180" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Read it like this</text>
  <text x="840" y="220" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">arr[0]  : first value</text>
  <text x="840" y="255" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">arr[-1] : last value</text>
  <text x="840" y="290" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">arr[1:4]: index 1 to 3</text>
</svg>
