<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="360" fill="#f9fbff"/>
  <text x="460" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Key Options in sns.histplot()</text>

  <rect x="60" y="84" width="170" height="110" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="145" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#075985">bins</text>
  <text x="145" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">How many intervals</text>
  <text x="145" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">the data is split into</text>

  <rect x="265" y="84" width="170" height="110" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">kde</text>
  <text x="350" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">Smooth curve over</text>
  <text x="350" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">the histogram</text>

  <rect x="470" y="84" width="170" height="110" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="555" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#92400e">hue</text>
  <text x="555" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">Split by category</text>
  <text x="555" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">with different colors</text>

  <rect x="675" y="84" width="170" height="110" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="760" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#991b1b">stat</text>
  <text x="760" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">count, density,</text>
  <text x="760" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1f2937">probability...</text>

  <rect x="180" y="230" width="560" height="92" rx="18" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="460" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#4338ca">sns.histplot(data=df, x="score", bins=15, kde=True, hue="group", stat="density")</text>
  <text x="460" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">Seaborn keeps the histogram idea from Matplotlib but makes grouped statistical views easier.</text>
</svg>
