<svg width="920" height="340" viewBox="0 0 920 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="340" fill="#fffdf7"/>
  <text x="460" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Where Seaborn Fits</text>

  <rect x="60" y="90" width="220" height="150" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Pandas</text>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">DataFrame columns</text>
  <text x="170" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">named variables</text>
  <text x="170" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">group labels</text>

  <rect x="350" y="72" width="220" height="186" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="460" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#166534">Seaborn</text>
  <text x="460" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">statistical plotting</text>
  <text x="460" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">good defaults</text>
  <text x="460" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">easy hue / kde / style</text>
  <text x="460" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">DataFrame-friendly API</text>

  <rect x="640" y="90" width="220" height="150" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="750" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#991b1b">Matplotlib</text>
  <text x="750" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Figure / Axes</text>
  <text x="750" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">layout control</text>
  <text x="750" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">titles, labels, saving</text>

  <line x1="280" y1="165" x2="350" y2="165" stroke="#2563eb" stroke-width="4"/>
  <polygon points="350,165 338,158 338,172" fill="#2563eb"/>

  <line x1="570" y1="165" x2="640" y2="165" stroke="#16a34a" stroke-width="4"/>
  <polygon points="640,165 628,158 628,172" fill="#16a34a"/>

  <text x="460" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#374151">Seaborn reads tidy data easily and still relies on Matplotlib for final rendering control.</text>
