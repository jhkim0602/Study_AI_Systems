<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" style="background:#ffffff; font-family:sans-serif;">
  <text x="400" y="35" fill="#2d3436" font-size="24" font-weight="bold" text-anchor="middle">난수 분포 시각화 (Uniform vs Normal)</text>
  
  <g transform="translate(100, 80)">
    <!-- Uniform Distribution -->
    <rect x="0" y="0" width="250" height="180" rx="8" fill="#f5f6fa" stroke="#dcdde1" stroke-width="2"/>
    <text x="125" y="-15" fill="#0097e6" font-size="18" font-weight="bold" text-anchor="middle">np.random.uniform()</text>
    <text x="125" y="165" fill="#718093" font-size="14" text-anchor="middle">지정된 구간 내 균등(고른) 분포</text>
    
    <!-- Uniform Histogram bars -->
    <rect x="25" y="50" width="20" height="80" fill="#00a8ff" fill-opacity="0.8"/>
    <rect x="55" y="45" width="20" height="85" fill="#00a8ff" fill-opacity="0.8"/>
    <rect x="85" y="52" width="20" height="78" fill="#00a8ff" fill-opacity="0.8"/>
    <rect x="115" y="48" width="20" height="82" fill="#00a8ff" fill-opacity="0.8"/>
    <rect x="145" y="55" width="20" height="75" fill="#00a8ff" fill-opacity="0.8"/>
    <rect x="175" y="47" width="20" height="83" fill="#00a8ff" fill-opacity="0.8"/>
    <rect x="205" y="50" width="20" height="80" fill="#00a8ff" fill-opacity="0.8"/>
    <path d="M 15 50 Q 125 50 235 50" fill="none" stroke="#e84118" stroke-width="3" stroke-dasharray="6,4"/>
  </g>

  <g transform="translate(450, 80)">
    <!-- Normal Distribution -->
    <rect x="0" y="0" width="250" height="180" rx="8" fill="#f5f6fa" stroke="#dcdde1" stroke-width="2"/>
    <text x="125" y="-15" fill="#4cd137" font-size="18" font-weight="bold" text-anchor="middle">np.random.normal()</text>
    <text x="125" y="165" fill="#718093" font-size="14" text-anchor="middle">평균을 중심으로 한 정규 분포 (종모양)</text>
    
    <!-- Normal Histogram bars -->
    <rect x="25" y="110" width="20" height="20" fill="#44bd32" fill-opacity="0.8"/>
    <rect x="55" y="80" width="20" height="50" fill="#44bd32" fill-opacity="0.8"/>
    <rect x="85" y="40" width="20" height="90" fill="#44bd32" fill-opacity="0.8"/>
    <rect x="115" y="20" width="20" height="110" fill="#44bd32" fill-opacity="0.8"/>
    <rect x="145" y="45" width="20" height="85" fill="#44bd32" fill-opacity="0.8"/>
    <rect x="175" y="85" width="20" height="45" fill="#44bd32" fill-opacity="0.8"/>
    <rect x="205" y="115" width="20" height="15" fill="#44bd32" fill-opacity="0.8"/>
    
    <path d="M 15 120 Q 125 -60 235 120" fill="none" stroke="#e84118" stroke-width="3"/>
    <line x1="125" y1="20" x2="125" y2="130" stroke="#2f3640" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="125" y="145" fill="#2f3640" font-size="12" text-anchor="middle">평균 (loc)</text>
  </g>
</svg>
