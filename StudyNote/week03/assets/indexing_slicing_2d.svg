<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" style="background:#f9f9f9; font-family:sans-serif;">
  <text x="400" y="35" fill="#2c3e50" font-size="24" font-weight="bold" text-anchor="middle">2차원 배열 인덱싱 및 슬라이싱</text>
  
  <g transform="translate(60, 70)">
    <!-- matrix[0, 0] -->
    <text x="75" y="0" fill="#e74c3c" font-size="16" font-weight="bold" text-anchor="middle">matrix[0, 0]</text>
    <rect x="0" y="20" width="150" height="150" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <!-- Grid lines -->
    <line x1="50" y1="20" x2="50" y2="170" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="100" y1="20" x2="100" y2="170" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="70" x2="150" y2="70" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="120" x2="150" y2="120" stroke="#bdc3c7" stroke-width="2"/>
    <!-- Highlight [0,0] -->
    <rect x="0" y="20" width="50" height="50" fill="#e74c3c" fill-opacity="0.8"/>
  </g>

  <g transform="translate(320, 70)">
    <!-- matrix[:, 1] -->
    <text x="75" y="0" fill="#3498db" font-size="16" font-weight="bold" text-anchor="middle">matrix[:, 1]</text>
    <rect x="0" y="20" width="150" height="150" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="50" y1="20" x2="50" y2="170" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="100" y1="20" x2="100" y2="170" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="70" x2="150" y2="70" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="120" x2="150" y2="120" stroke="#bdc3c7" stroke-width="2"/>
    <!-- Highlight [:,1] -->
    <rect x="50" y="20" width="50" height="150" fill="#3498db" fill-opacity="0.8"/>
  </g>
  
  <g transform="translate(580, 70)">
    <!-- matrix[:2, :2] -->
    <text x="75" y="0" fill="#2ecc71" font-size="16" font-weight="bold" text-anchor="middle">matrix[:2, :2]</text>
    <rect x="0" y="20" width="150" height="150" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="50" y1="20" x2="50" y2="170" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="100" y1="20" x2="100" y2="170" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="70" x2="150" y2="70" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="0" y1="120" x2="150" y2="120" stroke="#bdc3c7" stroke-width="2"/>
    <!-- Highlight [:2,:2] -->
    <rect x="0" y="20" width="100" height="100" fill="#2ecc71" fill-opacity="0.8"/>
  </g>
  
  <text x="400" y="270" fill="#7f8c8d" font-size="14" text-anchor="middle">행(Row)과 열(Column)을 콤마(,)를 기준으로 나누어 구분합니다.</text>
</svg>
