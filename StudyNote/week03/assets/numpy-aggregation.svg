<svg width="1100" height="400" viewBox="0 0 1100 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1100" height="400" fill="#f7f8fc"/>
  <text x="60" y="60" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="28" font-weight="700" fill="#1f2937">NumPy 자주 쓰는 기초 함수 (집계 연산)</text>

  <rect x="60" y="100" width="980" height="260" rx="20" fill="#ffffff" stroke="#d6dae6"/>
  <text x="90" y="150" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="22" font-weight="700" fill="#111827">데이터 집계 함수</text>
  <text x="90" y="185" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#4b5563">배열의 전체 데이터에서 특정한 단일 결과를 도출합니다.</text>

  <g font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="20">
    <!-- Source Array -->
    <rect x="250" y="240" width="60" height="60" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="320" y="240" width="60" height="60" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="390" y="240" width="60" height="60" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="460" y="240" width="60" height="60" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
    <rect x="530" y="240" width="60" height="60" rx="10" fill="#dbeafe" stroke="#60a5fa"/>

    <text x="280" y="278" text-anchor="middle" fill="#111827">1</text>
    <text x="350" y="278" text-anchor="middle" fill="#111827">2</text>
    <text x="420" y="278" text-anchor="middle" fill="#111827">3</text>
    <text x="490" y="278" text-anchor="middle" fill="#111827">4</text>
    <text x="560" y="278" text-anchor="middle" fill="#111827">5</text>

    <text x="170" y="278" font-size="22" font-family="monospace" font-weight="bold" fill="#2563eb">arr</text>

    <!-- Connectors -->
    <!-- Line to sum -->
    <path d="M 600 250 L 660 160 L 720 160" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="720,160 710,155 710,165" fill="#9ca3af"/>

    <!-- Line to mean -->
    <path d="M 600 260 L 660 210 L 720 210" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="720,210 710,205 710,215" fill="#9ca3af"/>

    <!-- Line to max -->
    <path d="M 600 280 L 660 300 L 720 300" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="720,300 710,295 710,305" fill="#9ca3af"/>

    <!-- Line to min -->
    <path d="M 600 290 L 660 350 L 720 350" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="720,350 710,345 710,355" fill="#9ca3af"/>

    <!-- Functions and Results -->
    <g transform="translate(735, 140)">
      <rect x="0" y="0" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="16" fill="#0f172a">np.sum(arr)</text>
      <text x="140" y="26" font-weight="bold" fill="#ef4444">15</text>
      <text x="180" y="26" font-size="16" fill="#64748b">(합계)</text>
    </g>

    <g transform="translate(735, 190)">
      <rect x="0" y="0" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="16" fill="#0f172a">np.mean(arr)</text>
      <text x="140" y="26" font-weight="bold" fill="#f59e0b">3.0</text>
      <text x="185" y="26" font-size="16" fill="#64748b">(평균)</text>
    </g>

    <g transform="translate(735, 280)">
      <rect x="0" y="0" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="16" fill="#0f172a">np.max(arr)</text>
      <text x="140" y="26" font-weight="bold" fill="#10b981">5</text>
      <text x="170" y="26" font-size="16" fill="#64748b">(최댓값)</text>
    </g>

    <g transform="translate(735, 330)">
      <rect x="0" y="0" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="16" fill="#0f172a">np.min(arr)</text>
      <text x="140" y="26" font-weight="bold" fill="#3b82f6">1</text>
      <text x="170" y="26" font-size="16" fill="#64748b">(최솟값)</text>
    </g>
  </g>
</svg>
