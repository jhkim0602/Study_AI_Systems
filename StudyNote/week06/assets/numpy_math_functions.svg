<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" style="background:#1e1e1e; font-family:sans-serif;">
  <text x="400" y="40" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">NumPy 기초 수학 함수 시각화</text>
  
  <g transform="translate(50, 70)">
    <rect width="150" height="150" rx="8" fill="#2d2d2d" stroke="#555"/>
    <text x="75" y="140" fill="#aaa" font-size="14" text-anchor="middle">y = np.sin(x)</text>
    <polyline points="10,75 20,40 30,20 40,30 50,75 60,120 70,130 80,120 90,75 100,30 110,20 120,40 130,75 140,110" fill="none" stroke="#4db8ff" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(230, 70)">
    <rect width="150" height="150" rx="8" fill="#2d2d2d" stroke="#555"/>
    <text x="75" y="140" fill="#aaa" font-size="14" text-anchor="middle">y = np.cos(x)</text>
    <polyline points="10,20 25,25 40,50 55,90 70,125 85,120 100,90 115,50 130,25 140,20" fill="none" stroke="#69d2e7" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(410, 70)">
    <rect width="150" height="150" rx="8" fill="#2d2d2d" stroke="#555"/>
    <text x="75" y="140" fill="#aaa" font-size="14" text-anchor="middle">y = np.tan(x)</text>
    <path d="M 20 120 Q 50 100 65 20 M 75 130 Q 90 40 130 20" fill="none" stroke="#f38630" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="10" x2="70" y2="140" stroke="#555" stroke-dasharray="4,4" stroke-width="1.5"/>
  </g>
  
  <g transform="translate(590, 70)">
    <rect width="150" height="150" rx="8" fill="#2d2d2d" stroke="#555"/>
    <text x="75" y="140" fill="#aaa" font-size="14" text-anchor="middle">y = np.exp(x)</text>
    <path d="M 10 120 Q 80 110 140 20" fill="none" stroke="#fa6900" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
