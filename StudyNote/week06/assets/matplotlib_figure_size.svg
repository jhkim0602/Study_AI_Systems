<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" style="background:#f4f6f8; font-family:sans-serif;">
  <text x="400" y="30" fill="#2c3e50" font-size="22" font-weight="bold" text-anchor="middle">Figure 크기 설정 (figsize vs set_size_inches)</text>
  
  <g transform="translate(100, 60)">
    <!-- figsize -->
    <text x="100" y="0" fill="#2980b9" font-size="16" font-weight="bold" text-anchor="middle">1. 시작할 때 지정 (figsize)</text>
    <rect x="25" y="20" width="150" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="100" y="75" fill="#7f8c8d" font-size="14" text-anchor="middle">subplots(figsize=...)</text>
  </g>
  
  <path d="M 320 120 L 370 120" stroke="#7f8c8d" stroke-width="4"/>
  <polygon points="370,110 390,120 370,130" fill="#7f8c8d"/>

  <g transform="translate(420, 60)">
    <!-- set_size_inches -->
    <text x="125" y="0" fill="#27ae60" font-size="16" font-weight="bold" text-anchor="middle">2. 생성 후 나중에 변경 (set_size_inches)</text>
    <rect x="0" y="20" width="100" height="66" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <text x="50" y="55" fill="#bdc3c7" font-size="12" text-anchor="middle">기본사이즈</text>
    <!-- Arrow expanding -->
    <path d="M 110 55 L 140 55" stroke="#27ae60" stroke-width="3"/>
    <polygon points="140,50 140,60 150,55" fill="#27ae60"/>
    
    <rect x="160" y="10" width="180" height="120" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="250" y="75" fill="#2ecc71" font-size="14" text-anchor="middle">fig.set_size_inches()</text>
  </g>
</svg>
