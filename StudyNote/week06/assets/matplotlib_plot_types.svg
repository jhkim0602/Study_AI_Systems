<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" style="background:#2f3542; font-family:sans-serif;">
  <text x="400" y="35" fill="#ffffff" font-size="24" font-weight="bold" text-anchor="middle">주요 그래프 유형: 추세, 관계, 분포</text>
  
  <!-- Line Plot -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="200" height="150" rx="4" fill="#57606f" stroke="#a4b0be" stroke-width="2"/>
    <text x="100" y="-15" fill="#1e90ff" font-size="18" font-weight="bold" text-anchor="middle">plot() [선그래프]</text>
    <text x="100" y="175" fill="#f1f2f6" font-size="14" text-anchor="middle">시간/순서에 따른 "추세" 파악</text>
    <!-- Graph -->
    <path d="M 20 130 L 60 90 L 100 110 L 140 40 L 180 50" fill="none" stroke="#1e90ff" stroke-width="4"/>
    <circle cx="20" cy="130" r="4" fill="#ffffff"/>
    <circle cx="60" cy="90" r="4" fill="#ffffff"/>
    <circle cx="100" cy="110" r="4" fill="#ffffff"/>
    <circle cx="140" cy="40" r="4" fill="#ffffff"/>
    <circle cx="180" cy="50" r="4" fill="#ffffff"/>
  </g>

  <!-- Scatter Plot -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="150" rx="4" fill="#57606f" stroke="#a4b0be" stroke-width="2"/>
    <text x="100" y="-15" fill="#ffa502" font-size="18" font-weight="bold" text-anchor="middle">scatter() [산점도]</text>
    <text x="100" y="175" fill="#f1f2f6" font-size="14" text-anchor="middle">두 변수 간 "관계/군집" 파악</text>
    <!-- Dots -->
    <circle cx="40" cy="120" r="6" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="50" cy="110" r="5" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="70" cy="130" r="7" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="90" cy="80" r="6" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="110" cy="75" r="5" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="140" cy="40" r="7" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="150" cy="55" r="6" fill="#ffa502" fill-opacity="0.8"/>
    <circle cx="170" cy="30" r="5" fill="#ffa502" fill-opacity="0.8"/>
  </g>
  
  <!-- Histogram -->
  <g transform="translate(550, 80)">
    <rect x="0" y="0" width="200" height="150" rx="4" fill="#57606f" stroke="#a4b0be" stroke-width="2"/>
    <text x="100" y="-15" fill="#2ed573" font-size="18" font-weight="bold" text-anchor="middle">hist() [히스토그램]</text>
    <text x="100" y="175" fill="#f1f2f6" font-size="14" text-anchor="middle">특정한 값들의 "분포/빈도" 파악</text>
    <!-- Bars -->
    <rect x="25" y="100" width="25" height="48" fill="#2ed573" stroke="#ffffff" stroke-width="1"/>
    <rect x="50" y="60" width="25" height="88" fill="#2ed573" stroke="#ffffff" stroke-width="1"/>
    <rect x="75" y="30" width="25" height="118" fill="#2ed573" stroke="#ffffff" stroke-width="1"/>
    <rect x="100" y="20" width="25" height="128" fill="#2ed573" stroke="#ffffff" stroke-width="1"/>
    <rect x="125" y="45" width="25" height="103" fill="#2ed573" stroke="#ffffff" stroke-width="1"/>
    <rect x="150" y="90" width="25" height="58" fill="#2ed573" stroke="#ffffff" stroke-width="1"/>
  </g>
</svg>
