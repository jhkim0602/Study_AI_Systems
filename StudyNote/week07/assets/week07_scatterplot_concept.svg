<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="360" fill="#fffdfa"/>
  <text x="460" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">How to Read a Scatterplot</text>

  <line x1="90" y1="300" x2="540" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="90" y1="70" x2="90" y2="300" stroke="#374151" stroke-width="2"/>
  <text x="315" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#374151">x variable (e.g. study_hours)</text>
  <text x="38" y="188" transform="rotate(-90 38 188)" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#374151">y variable (e.g. score)</text>

  <circle cx="135" cy="268" r="7" fill="#2563eb"/>
  <circle cx="165" cy="252" r="7" fill="#2563eb"/>
  <circle cx="195" cy="240" r="7" fill="#2563eb"/>
  <circle cx="225" cy="222" r="7" fill="#2563eb"/>
  <circle cx="255" cy="214" r="7" fill="#2563eb"/>
  <circle cx="285" cy="196" r="7" fill="#2563eb"/>
  <circle cx="320" cy="182" r="7" fill="#2563eb"/>
  <circle cx="352" cy="168" r="7" fill="#2563eb"/>
  <circle cx="385" cy="154" r="7" fill="#2563eb"/>
  <circle cx="418" cy="138" r="7" fill="#2563eb"/>
  <circle cx="452" cy="126" r="7" fill="#2563eb"/>
  <circle cx="485" cy="112" r="7" fill="#2563eb"/>
  <circle cx="505" cy="86" r="8" fill="#dc2626"/>

  <line x1="125" y1="270" x2="495" y2="104" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="355" y="94" font-family="Arial, sans-serif" font-size="15" fill="#475569">positive relationship</text>
  <text x="518" y="82" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">possible outlier</text>

  <rect x="615" y="88" width="230" height="180" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="730" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#1f2937">What to check</text>
  <text x="640" y="156" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">1. One point = one row</text>
  <text x="640" y="184" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">2. Is the pattern rising?</text>
  <text x="640" y="212" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">3. Are there clusters?</text>
  <text x="640" y="240" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">4. Is there an outlier?</text>
</svg>
