<svg width="920" height="300" viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="300" fill="#fffdfa"/>
  <text x="460" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">From Raw Numbers to a Histogram</text>

  <rect x="50" y="92" width="220" height="132" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="160" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#075985">1. Sort</text>
  <text x="160" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">np.sort(data)</text>
  <text x="160" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">See low to high flow</text>
  <text x="160" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Spot extreme values</text>

  <rect x="350" y="76" width="220" height="164" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="460" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">2. Summarize</text>
  <text x="460" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">min / max</text>
  <text x="460" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">mean / median</text>
  <text x="460" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">std / percentile</text>
  <text x="460" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Range, center, spread</text>

  <rect x="650" y="92" width="220" height="132" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="760" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#991b1b">3. Histogram</text>
  <text x="760" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">plt.hist(data)</text>
  <text x="760" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Check shape by bins</text>
  <text x="760" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1f2937">Compare distributions</text>

  <line x1="270" y1="158" x2="350" y2="158" stroke="#0284c7" stroke-width="4"/>
  <polygon points="350,158 338,151 338,165" fill="#0284c7"/>
  <line x1="570" y1="158" x2="650" y2="158" stroke="#16a34a" stroke-width="4"/>
  <polygon points="650,158 638,151 638,165" fill="#16a34a"/>
</svg>
