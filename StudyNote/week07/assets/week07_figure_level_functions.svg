<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="920" height="360" fill="#fbfcff"/>
  <text x="460" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Seaborn Figure-Level Functions Around FacetGrid</text>

  <rect x="340" y="130" width="240" height="100" rx="18" fill="#e0e7ff" stroke="#6366f1" stroke-width="2.5"/>
  <text x="460" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#4338ca">FacetGrid</text>
  <text x="460" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">manual panel control</text>

  <rect x="80" y="72" width="180" height="84" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="170" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">relplot</text>
  <text x="170" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">scatter / line + facets</text>

  <rect x="80" y="210" width="180" height="84" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="170" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#92400e">displot</text>
  <text x="170" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">hist / kde / ecdf + facets</text>

  <rect x="660" y="72" width="180" height="84" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="750" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#991b1b">catplot</text>
  <text x="750" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">count / bar / box + facets</text>

  <rect x="660" y="210" width="180" height="84" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="750" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#075985">pairplot</text>
  <text x="750" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">PairGrid-based pairwise view</text>

  <line x1="260" y1="114" x2="340" y2="160" stroke="#16a34a" stroke-width="4"/>
  <line x1="260" y1="252" x2="340" y2="202" stroke="#d97706" stroke-width="4"/>
  <line x1="580" y1="160" x2="660" y2="114" stroke="#dc2626" stroke-width="4"/>
  <line x1="580" y1="202" x2="660" y2="252" stroke="#0284c7" stroke-width="4"/>

  <text x="460" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Use FacetGrid directly for control, or use figure-level helpers for speed.</text>
</svg>
