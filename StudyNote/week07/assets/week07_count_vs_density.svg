<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" style="background:#f8fafc; font-family:sans-serif;">
  <text x="450" y="36" text-anchor="middle" font-size="26" font-weight="bold" fill="#1e293b">count와 density의 차이</text>

  <g transform="translate(70,75)">
    <text x="150" y="-14" text-anchor="middle" font-size="18" font-weight="bold" fill="#2563eb">count 기준</text>
    <line x1="20" y1="180" x2="280" y2="180" stroke="#475569" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="180" stroke="#475569" stroke-width="2"/>
    <rect x="40" y="130" width="30" height="50" fill="#60a5fa"/>
    <rect x="72" y="90" width="30" height="90" fill="#60a5fa"/>
    <rect x="104" y="45" width="30" height="135" fill="#60a5fa"/>
    <rect x="136" y="35" width="30" height="145" fill="#60a5fa"/>
    <rect x="168" y="65" width="30" height="115" fill="#60a5fa"/>
    <rect x="200" y="110" width="30" height="70" fill="#60a5fa"/>
    <rect x="232" y="145" width="30" height="35" fill="#60a5fa"/>
    <text x="150" y="214" text-anchor="middle" font-size="14" fill="#64748b">막대 높이 = 실제 개수</text>
  </g>

  <g transform="translate(470,75)">
    <text x="150" y="-14" text-anchor="middle" font-size="18" font-weight="bold" fill="#dc2626">density=True</text>
    <line x1="20" y1="180" x2="280" y2="180" stroke="#475569" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="180" stroke="#475569" stroke-width="2"/>
    <path d="M 35 165 C 70 110, 110 50, 150 42 C 190 35, 225 80, 260 150" fill="none" stroke="#ef4444" stroke-width="4"/>
    <rect x="40" y="138" width="30" height="42" fill="#fecaca" fill-opacity="0.7"/>
    <rect x="72" y="102" width="30" height="78" fill="#fecaca" fill-opacity="0.7"/>
    <rect x="104" y="58" width="30" height="122" fill="#fecaca" fill-opacity="0.7"/>
    <rect x="136" y="46" width="30" height="134" fill="#fecaca" fill-opacity="0.7"/>
    <rect x="168" y="76" width="30" height="104" fill="#fecaca" fill-opacity="0.7"/>
    <rect x="200" y="118" width="30" height="62" fill="#fecaca" fill-opacity="0.7"/>
    <rect x="232" y="150" width="30" height="30" fill="#fecaca" fill-opacity="0.7"/>
    <text x="150" y="214" text-anchor="middle" font-size="14" fill="#64748b">막대 면적 합이 1이 되도록 정규화</text>
  </g>

  <text x="450" y="298" text-anchor="middle" font-size="15" fill="#475569">샘플 수가 다른 두 집단을 비교할 때는 density가 더 공정한 비교를 도와줄 수 있다.</text>
</svg>
