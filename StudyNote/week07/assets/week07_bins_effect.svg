<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" style="background:#ffffff; font-family:sans-serif;">
  <text x="450" y="34" text-anchor="middle" font-size="26" font-weight="bold" fill="#1f2937">bin 개수에 따라 히스토그램 모양이 달라진다</text>

