<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NumPy 배열 비교연산 시각화</title>
  <desc id="desc">배열 원소를 특정 값과 비교했을 때 불리언 배열이 생성되는 모습을 보여준다.</desc>
  <rect width="860" height="320" fill="#f8fafc"/>
  <text x="40" y="42" font-size="26" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">배열 비교연산</text>
  <text x="40" y="72" font-size="15" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">비교 결과는 하나의 값이 아니라 불리언 배열로 나온다.</text>

  <text x="56" y="114" font-size="18" font-family="monospace" fill="#1e293b">compare_arr = [1, 3, 5, 7]</text>
  <rect x="50" y="132" width="70" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="128" y="132" width="70" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="206" y="132" width="70" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="284" y="132" width="70" height="56" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="85" y="168" text-anchor="middle" font-size="24" font-family="monospace" fill="#1e3a8a">1</text>
  <text x="163" y="168" text-anchor="middle" font-size="24" font-family="monospace" fill="#1e3a8a">3</text>
  <text x="241" y="168" text-anchor="middle" font-size="24" font-family="monospace" fill="#1e3a8a">5</text>
  <text x="319" y="168" text-anchor="middle" font-size="24" font-family="monospace" fill="#1e3a8a">7</text>

  <text x="50" y="226" font-size="20" font-family="monospace" font-weight="700" fill="#0f172a">compare_arr &gt; 3</text>
  <rect x="50" y="242" width="70" height="44" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <rect x="128" y="242" width="70" height="44" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <rect x="206" y="242" width="70" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <rect x="284" y="242" width="70" height="44" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="85" y="270" text-anchor="middle" font-size="16" font-family="monospace" fill="#991b1b">False</text>
  <text x="163" y="270" text-anchor="middle" font-size="16" font-family="monospace" fill="#991b1b">False</text>
  <text x="241" y="270" text-anchor="middle" font-size="16" font-family="monospace" fill="#166534">True</text>
  <text x="319" y="270" text-anchor="middle" font-size="16" font-family="monospace" fill="#166534">True</text>

  <text x="470" y="118" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">대표 예시</text>
  <text x="470" y="152" font-size="16" font-family="monospace" fill="#334155">compare_arr &gt; 3</text>
  <text x="470" y="178" font-size="16" font-family="monospace" fill="#334155">compare_arr == 5</text>
  <text x="470" y="204" font-size="16" font-family="monospace" fill="#334155">compare_arr % 2 == 1</text>
  <text x="470" y="244" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">핵심</text>
  <text x="470" y="272" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">• 결과는 하나의 bool 값이 아니라 bool 배열</text>
  <text x="470" y="298" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">• 이후 조건 필터링으로 확장 가능</text>
</svg>
