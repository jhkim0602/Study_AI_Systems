<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="70" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="30" font-weight="700" fill="#0f172a">내적의 부호와 방향 관계</text>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="340" height="560" rx="24" fill="#ffffff" stroke="#dbe3f0"/>
  <text x="90" y="175" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="24" font-weight="700" fill="#0f172a">1. 같은 방향</text>
  <line x1="120" y1="500" x2="320" y2="500" stroke="#94a3b8" stroke-width="3"/>
  <line x1="120" y1="500" x2="120" y2="250" stroke="#94a3b8" stroke-width="3"/>
  <line x1="120" y1="500" x2="220" y2="380" stroke="#2563eb" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <line x1="120" y1="500" x2="300" y2="300" stroke="#16a34a" stroke-width="6" marker-end="url(#arrowGreen)"/>
  <text x="230" y="375" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#2563eb">a</text>
  <text x="305" y="295" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#16a34a">b</text>
  <text x="90" y="570" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="20" fill="#334155">내적 &gt; 0</text>
  <text x="90" y="605" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="16" fill="#64748b">같은 방향으로 기여합니다.</text>

  <rect x="430" y="120" width="340" height="560" rx="24" fill="#ffffff" stroke="#dbe3f0"/>
  <text x="460" y="175" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="24" font-weight="700" fill="#0f172a">2. 수직</text>
  <line x1="490" y1="500" x2="690" y2="500" stroke="#94a3b8" stroke-width="3"/>
  <line x1="490" y1="500" x2="490" y2="250" stroke="#94a3b8" stroke-width="3"/>
  <line x1="490" y1="500" x2="650" y2="500" stroke="#2563eb" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="500" x2="490" y2="320" stroke="#16a34a" stroke-width="6" marker-end="url(#arrowGreen)"/>
  <text x="655" y="500" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#2563eb">a</text>
  <text x="500" y="315" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#16a34a">b</text>
  <text x="460" y="570" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="20" fill="#334155">내적 = 0</text>
  <text x="460" y="605" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="16" fill="#64748b">서로 방향 기여가 없습니다.</text>

  <rect x="800" y="120" width="340" height="560" rx="24" fill="#ffffff" stroke="#dbe3f0"/>
  <text x="830" y="175" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="24" font-weight="700" fill="#0f172a">3. 반대 방향</text>
  <line x1="860" y1="500" x2="1060" y2="500" stroke="#94a3b8" stroke-width="3"/>
  <line x1="860" y1="500" x2="860" y2="250" stroke="#94a3b8" stroke-width="3"/>
  <line x1="860" y1="500" x2="1020" y2="380" stroke="#2563eb" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <line x1="860" y1="500" x2="760" y2="580" stroke="#dc2626" stroke-width="6" marker-end="url(#arrowRed)"/>
  <text x="1028" y="375" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#2563eb">a</text>
  <text x="735" y="595" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#dc2626">b</text>
  <text x="830" y="570" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="20" fill="#334155">내적 &lt; 0</text>
  <text x="830" y="605" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="16" fill="#64748b">서로 반대로 작용합니다.</text>
</svg>
