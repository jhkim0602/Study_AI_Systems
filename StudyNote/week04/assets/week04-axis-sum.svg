<svg width="860" height="360" viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NumPy axis와 sum 계산 시각화</title>
  <desc id="desc">2차원 배열에서 axis 0과 axis 1이 각각 열과 행 기준으로 계산되는 모습을 보여준다.</desc>
  <rect width="860" height="360" fill="#f8fafc"/>
  <text x="40" y="42" font-size="26" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">axis 와 sum 계산</text>
  <text x="40" y="72" font-size="15" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">2차원 배열에서는 전체 합계뿐 아니라 열별, 행별 합계도 구할 수 있다.</text>

  <text x="70" y="116" font-size="18" font-family="monospace" fill="#1e293b">ops_matrix =</text>
  <rect x="70" y="130" width="70" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="148" y="130" width="70" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="226" y="130" width="70" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="70" y="194" width="70" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="148" y="194" width="70" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="226" y="194" width="70" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="105" y="166" text-anchor="middle" font-size="24" font-family="monospace" fill="#075985">1</text>
  <text x="183" y="166" text-anchor="middle" font-size="24" font-family="monospace" fill="#075985">2</text>
  <text x="261" y="166" text-anchor="middle" font-size="24" font-family="monospace" fill="#075985">3</text>
  <text x="105" y="230" text-anchor="middle" font-size="24" font-family="monospace" fill="#075985">4</text>
  <text x="183" y="230" text-anchor="middle" font-size="24" font-family="monospace" fill="#075985">5</text>
  <text x="261" y="230" text-anchor="middle" font-size="24" font-family="monospace" fill="#075985">6</text>

  <text x="380" y="116" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">axis=0 : 열 기준 합계</text>
  <line x1="105" y1="130" x2="105" y2="250" stroke="#f97316" stroke-width="4"/>
  <line x1="183" y1="130" x2="183" y2="250" stroke="#f97316" stroke-width="4"/>
  <line x1="261" y1="130" x2="261" y2="250" stroke="#f97316" stroke-width="4"/>
  <text x="380" y="152" font-size="16" font-family="monospace" fill="#7c2d12">1+4 = 5</text>
  <text x="380" y="178" font-size="16" font-family="monospace" fill="#7c2d12">2+5 = 7</text>
  <text x="380" y="204" font-size="16" font-family="monospace" fill="#7c2d12">3+6 = 9</text>
  <text x="380" y="236" font-size="18" font-family="monospace" font-weight="700" fill="#9a3412">[5 7 9]</text>

  <text x="380" y="286" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">axis=1 : 행 기준 합계</text>
  <line x1="70" y1="158" x2="296" y2="158" stroke="#16a34a" stroke-width="4"/>
  <line x1="70" y1="222" x2="296" y2="222" stroke="#16a34a" stroke-width="4"/>
  <text x="380" y="316" font-size="16" font-family="monospace" fill="#166534">1+2+3 = 6</text>
  <text x="520" y="316" font-size="16" font-family="monospace" fill="#166534">4+5+6 = 15</text>
  <text x="700" y="316" font-size="18" font-family="monospace" font-weight="700" fill="#166534">[6 15]</text>

  <text x="650" y="116" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">전체 합계</text>
  <text x="650" y="148" font-size="16" font-family="monospace" fill="#334155">1+2+3+4+5+6 = 21</text>
  <text x="650" y="186" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700" fill="#0f172a">기억할 점</text>
  <text x="650" y="214" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">• axis=0 은 열 방향</text>
  <text x="650" y="240" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">• axis=1 은 행 방향</text>
  <text x="650" y="266" font-size="16" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#334155">• sum, mean 모두 같은 원리</text>
</svg>
