<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="70" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="30" font-weight="700" fill="#0f172a">사람 비유로 이해하는 내적</text>

  <rect x="60" y="120" width="340" height="560" rx="24" fill="#ffffff" stroke="#dbe3f0"/>
  <text x="90" y="175" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="24" font-weight="700" fill="#0f172a">1. 같은 목표</text>
  <circle cx="150" cy="320" r="28" fill="#93c5fd"/><circle cx="250" cy="320" r="28" fill="#86efac"/>
  <line x1="150" y1="350" x2="150" y2="430" stroke="#2563eb" stroke-width="8"/>
  <line x1="250" y1="350" x2="250" y2="430" stroke="#16a34a" stroke-width="8"/>
  <line x1="150" y1="390" x2="210" y2="390" stroke="#2563eb" stroke-width="8"/>
  <line x1="250" y1="390" x2="310" y2="390" stroke="#16a34a" stroke-width="8"/>
  <text x="90" y="520" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#334155">둘 다 같은 방향으로 밀면</text>
  <text x="90" y="550" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#334155">내적은 양수입니다.</text>

  <rect x="430" y="120" width="340" height="560" rx="24" fill="#ffffff" stroke="#dbe3f0"/>
  <text x="460" y="175" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="24" font-weight="700" fill="#0f172a">2. 서로 무관</text>
  <circle cx="520" cy="320" r="28" fill="#93c5fd"/><circle cx="640" cy="320" r="28" fill="#86efac"/>
  <line x1="520" y1="350" x2="520" y2="430" stroke="#2563eb" stroke-width="8"/>
  <line x1="520" y1="390" x2="590" y2="390" stroke="#2563eb" stroke-width="8"/>
  <line x1="640" y1="350" x2="640" y2="430" stroke="#16a34a" stroke-width="8"/>
  <line x1="640" y1="390" x2="640" y2="320" stroke="#16a34a" stroke-width="8"/>
  <text x="460" y="520" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#334155">한 사람은 옆으로,</text>
  <text x="460" y="550" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#334155">다른 사람은 위로 가면 내적은 0입니다.</text>

  <rect x="800" y="120" width="340" height="560" rx="24" fill="#ffffff" stroke="#dbe3f0"/>
  <text x="830" y="175" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="24" font-weight="700" fill="#0f172a">3. 서로 충돌</text>
  <circle cx="900" cy="320" r="28" fill="#93c5fd"/><circle cx="1020" cy="320" r="28" fill="#fca5a5"/>
  <line x1="900" y1="350" x2="900" y2="430" stroke="#2563eb" stroke-width="8"/>
  <line x1="900" y1="390" x2="970" y2="390" stroke="#2563eb" stroke-width="8"/>
  <line x1="1020" y1="350" x2="1020" y2="430" stroke="#dc2626" stroke-width="8"/>
  <line x1="1020" y1="390" x2="950" y2="390" stroke="#dc2626" stroke-width="8"/>
  <text x="830" y="520" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#334155">서로 반대로 밀면</text>
  <text x="830" y="550" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans CJK KR', sans-serif" font-size="18" fill="#334155">내적은 음수가 됩니다.</text>
</svg>
